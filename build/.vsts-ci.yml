name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

# This pipeline was migrated off the internal csdkcontainerregistry container
# images and the self-hosted 'sdk-c--*' agent pools (which are no longer
# available) onto Microsoft-hosted vmImage agents, mirroring the structural
# fixes applied to azure-c-shared-utility/build/.vsts-ci.yml and
# azure-iot-sdk-c/build/.vsts-ci.yml.
#
# E2E tests are executed against a freshly-provisioned IoT Hub / DPS resource
# group created at the start of the run by the 'create_azure_resources' job.
# That job uses the Azure.Iot.Sdk.Test.psm1 PowerShell module from
# https://github.com/Azure/iot-sdks-e2e-fx/blob/master/scripts/Azure.Iot.Sdk.Test.psm1
# to generate per-run test config scripts (set_e2e_test_env_vars.sh and
# Set-E2ETestEnvVars.ps1), which are published as the 'test_config_scripts'
# pipeline artifact. Test jobs download the artifact and source/dot-source the
# appropriate script before invoking ctest, which gives uamqp's iothub_e2e
# test (the only E2E test in this repo) a valid IOTHUB_CONNECTION_STRING.
#
# A final 'destroy_azure_resource_group' job in the Cleanup stage tears down
# the resource group regardless of pipeline outcome.

resources:
  - repo: self
    clean: true

variables:
  AZURE_LOCATION: centraluseuap

stages:
- stage: Setup
  jobs:
  - job: create_azure_resources
    pool:
      vmImage: 'windows-latest'
    steps:
    - checkout: none
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'iot hub sdk service connection'
        # Use PowerShell 7 (pwsh) so RSA.ExportRSAPrivateKeyPem() is available.
        # Windows PowerShell 5.1 (scriptType: 'ps') lacks this API, which forces
        # the test config to fall back to PKCS#8 ("BEGIN PRIVATE KEY"). Schannel's
        # CryptDecodeObjectEx(PKCS_RSA_PRIVATE_KEY) can only decode PKCS#1 DER
        # ("BEGIN RSA PRIVATE KEY"), which matters for SDKs that exercise x509
        # auth via Schannel.
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Stop'
          $PSVersionTable

          New-Item -ItemType Directory -Force -Path test_config | Out-Null

          # Always pull Azure.Iot.Sdk.Test.psm1 from iot-sdks-e2e-fx@master.
          # The copy embedded in azure-iot-sdk-c@ewertons/pipelinefixes is stale.
          $PsmUrl = 'https://raw.githubusercontent.com/Azure/iot-sdks-e2e-fx/master/scripts/Azure.Iot.Sdk.Test.psm1'
          $PsmPath = Join-Path $PWD 'Azure.Iot.Sdk.Test.psm1'
          Invoke-WebRequest -Uri $PsmUrl -OutFile $PsmPath -UseBasicParsing
          Import-Module $PsmPath

          $ResourceGroupName = New-AzureResourceGroupName -OutFile 'test_config/azure-resource-group-name.txt'

          $TestEnvInfo = New-AzIotTestEnvironment `
              -AzureLocation $env:AZURE_LOCATION `
              -ResourceGroup $ResourceGroupName `
              -NoDps

          # Emit env vars consumed by uamqp's iothub_e2e test
          # (IOTHUB_CONNECTION_STRING and UAMQP_E2E_DEVICE_KEY for the
          # hard-coded "eh_testdevice" device id). The function provisions
          # the device against the freshly-created hub.
          New-AzIotuAmqpE2ETestConfig -TestEnvInfo $TestEnvInfo -Target bash       -OutFile 'test_config/set_e2e_test_env_vars.sh' | Out-Null
          New-AzIotuAmqpE2ETestConfig -TestEnvInfo $TestEnvInfo -Target powershell -OutFile 'test_config/Set-E2ETestEnvVars.ps1'  | Out-Null
      displayName: 'Create Azure Resources and Test Config'
    - publish: test_config
      artifact: test_config_scripts
      displayName: 'Publish artifact (test config scripts)'
      condition: always()

- stage: Tests
  dependsOn: Setup
  jobs:
  - job: checksubmodule
    variables:
      CodeQL.Enabled: false
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Check Submodules'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        sudo apt-get update && sudo apt-get install -y \
        curl \
        git \
        build-essential \
        pkg-config
        sudo curl -sL https://deb.nodesource.com/setup_16.x | bash -
        sudo apt-get install -y nodejs
      displayName: 'Setup'
    - script: |
        npm install check_submodules
        node_modules/.bin/check_submodules . master
      displayName: 'Check Submodules Match'

  - job: windowsx86
    timeoutInMinutes: 90
    pool:
      vmImage: 'windows-2022'
    displayName: 'Windows x86'
    # Disabled pending PR to add x86 stub for c-logging get_thread_stack.
    # See: https://github.com/ewertons/c-logging/tree/ewertons/x86-get-thread-stack-stub
    condition: false
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - powershell: |
        . "$(Pipeline.Workspace)\test_config_scripts\Set-E2ETestEnvVars.ps1"
        cmd /c "call jenkins\windows_c.cmd"
      displayName: 'Build and Test'
    - task: ComponentGovernanceComponentDetection@0
      displayName: 'Component Detection'

  - job: windowsx64
    timeoutInMinutes: 90
    variables:
      CodeQL.Enabled: $[eq(variables['Build.SourceBranch'], 'refs/heads/master')]
      CodeQL.Language: cpp
    pool:
      vmImage: 'windows-2022'
    displayName: 'Windows x64'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - task: CodeQL3000Init@0
    - powershell: |
        . "$(Pipeline.Workspace)\test_config_scripts\Set-E2ETestEnvVars.ps1"
        cmd /c "call jenkins\windows_c_VsDevCmd.cmd x64 && call jenkins\windows_c.cmd --platform x64"
      displayName: 'Build and Test'
    - task: CodeQL3000Finalize@0
      condition: always()
    - task: ComponentGovernanceComponentDetection@0
      displayName: 'Component Detection'

  - job: windowsdynamic
    timeoutInMinutes: 90
    pool:
      vmImage: 'windows-2022'
    displayName: 'Windows Dynamic'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        call jenkins\windows_c_VsDevCmd.cmd && call jenkins\windows_c_build_as_dynamic.cmd
      displayName: 'Build'
    - task: ComponentGovernanceComponentDetection@0
      displayName: 'Component Detection'

  - job: clang
    timeoutInMinutes: 90
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Linux Ubuntu Clang'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          build-essential \
          pkg-config \
          curl \
          libcurl4-openssl-dev \
          libssl-dev \
          uuid-dev
      displayName: 'Host setup'
    - script: |
        set -e
        export OPENSSL_ia32cap=0x00000000
        sudo chmod -R 755 .
        sudo -E bash -c 'source "$(Pipeline.Workspace)/test_config_scripts/set_e2e_test_env_vars.sh" && ./jenkins/ubuntu_clang.sh'
      displayName: 'Build and Test'

  - job: ubuntu2404
    timeoutInMinutes: 90
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Linux Ubuntu 24.04'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          pkg-config \
          curl \
          libcurl4-openssl-dev \
          libssl-dev \
          uuid-dev \
          valgrind
      displayName: 'Host setup'
    - script: |
        set -e
        export OPENSSL_ia32cap=0x00000000
        sudo chmod -R 755 .
        sudo -E bash -c 'source "$(Pipeline.Workspace)/test_config_scripts/set_e2e_test_env_vars.sh" && ./jenkins/ubuntu_c.sh'
      displayName: 'Build and Test'

  - job: linuxoptions
    timeoutInMinutes: 60
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Linux Ubuntu with Options'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          pkg-config \
          curl \
          libcurl4-openssl-dev \
          libssl-dev \
          uuid-dev
      displayName: 'Host setup'
    - script: 'sudo ./jenkins/linux_c_option_test.sh'
      displayName: 'Build'
      condition: always()

  - job: wolfssl
    timeoutInMinutes: 60
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'WolfSSL'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          build-essential \
          pkg-config \
          curl \
          libcurl4-openssl-dev \
          uuid-dev \
          libwolfssl-dev || true
      displayName: 'Host setup'
    - script: |
        LD_LIBRARY_PATH=/usr/local/lib
        LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/my_library/
        sudo jenkins/linux_wolfssl.sh
      displayName: 'Build'

  - job: debian
    timeoutInMinutes: 60
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Linux Debian (Buster)'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          pkg-config \
          curl \
          libcurl4-openssl-dev \
          libssl-dev \
          uuid-dev
      displayName: 'Host setup'
    - script: |
        sudo chmod 755 jenkins/debian_c.sh
        sudo -E ./jenkins/debian_c.sh
      displayName: 'Build'

  - job: linux_install_deps
    timeoutInMinutes: 60
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Linux with Installed Deps'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          pkg-config \
          curl \
          libcurl4-openssl-dev \
          libssl-dev \
          uuid-dev
      displayName: 'Host setup'
    - script: |
        sudo chmod 755 jenkins/linux_install_deps.sh
        sudo -E ./jenkins/linux_install_deps.sh
      displayName: 'Build'

  - job: OSX
    timeoutInMinutes: 60
    variables:
      CodeQL.Enabled: false
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    pool:
      vmImage: 'macOS-14'
    displayName: 'OSX'
    steps:
    # Repair the Component Detection node runtime on macOS-hosted images.
    # The auto-injected ComponentGovernance task invokes a hard-coded path
    # (.../externals/node20_1/bin/node) that exists as a directory on the
    # current macOS-14 image but is missing the "node" binary inside it.
    # Mirror a working node binary into every plausible externals root so
    # CG (and any other task expecting node20_1) succeeds. Idempotent.
    - bash: |
        set +e
        HOST_NODE="$(command -v node 2>/dev/null || true)"
        [ -n "$HOST_NODE" ] && echo "Host node: $HOST_NODE ($("$HOST_NODE" -v 2>/dev/null))"

        for ext in /Users/runner/actions-runner/cached/*/externals "$AGENT_HOMEDIRECTORY/externals" ; do
          [ -d "$ext" ] || continue
          target_dir="$ext/node20_1"
          target_bin="$target_dir/bin/node"

          if [ -x "$target_bin" ] && "$target_bin" -v >/dev/null 2>&1; then
            echo "OK: $target_bin ($("$target_bin" -v))"
            continue
          fi

          echo "Repairing $target_bin"
          mkdir -p "$target_dir/bin"
          rm -f "$target_bin"

          if [ -x "$ext/node20/bin/node" ]; then
            ln -sf "$ext/node20/bin/node" "$target_bin"
            echo "  -> linked from $ext/node20/bin/node"
          elif [ -n "$HOST_NODE" ] && [ -x "$HOST_NODE" ]; then
            ln -sf "$HOST_NODE" "$target_bin"
            echo "  -> linked from $HOST_NODE"
          else
            echo "  WARN: no node binary available on this image"
            continue
          fi

          "$target_bin" -v >/dev/null 2>&1 && echo "  Repaired: $target_bin ($("$target_bin" -v))"
        done
      displayName: 'Repair Component Detection node runtime'
      condition: always()
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - script: |
        bash -c 'source "$(Pipeline.Workspace)/test_config_scripts/set_e2e_test_env_vars.sh" && ./jenkins/osx_gcc_openssl.sh'
      displayName: 'Build and Test'
    - script: |
        rm -rf $(Agent.BuildDirectory)/*
        mkdir -p $(Agent.BuildDirectory)/s
      displayName: 'Cleanup'
      condition: always()

  - job: xcodenative
    timeoutInMinutes: 60
    variables:
      CodeQL.Enabled: false
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    pool:
      vmImage: 'macOS-14'
    displayName: 'XCode Native'
    steps:
    # Repair the Component Detection node runtime on macOS-hosted images.
    # The auto-injected ComponentGovernance task invokes a hard-coded path
    # (.../externals/node20_1/bin/node) that exists as a directory on the
    # current macOS-14 image but is missing the "node" binary inside it.
    # Mirror a working node binary into every plausible externals root so
    # CG (and any other task expecting node20_1) succeeds. Idempotent.
    - bash: |
        set +e
        HOST_NODE="$(command -v node 2>/dev/null || true)"
        [ -n "$HOST_NODE" ] && echo "Host node: $HOST_NODE ($("$HOST_NODE" -v 2>/dev/null))"

        for ext in /Users/runner/actions-runner/cached/*/externals "$AGENT_HOMEDIRECTORY/externals" ; do
          [ -d "$ext" ] || continue
          target_dir="$ext/node20_1"
          target_bin="$target_dir/bin/node"

          if [ -x "$target_bin" ] && "$target_bin" -v >/dev/null 2>&1; then
            echo "OK: $target_bin ($("$target_bin" -v))"
            continue
          fi

          echo "Repairing $target_bin"
          mkdir -p "$target_dir/bin"
          rm -f "$target_bin"

          if [ -x "$ext/node20/bin/node" ]; then
            ln -sf "$ext/node20/bin/node" "$target_bin"
            echo "  -> linked from $ext/node20/bin/node"
          elif [ -n "$HOST_NODE" ] && [ -x "$HOST_NODE" ]; then
            ln -sf "$HOST_NODE" "$target_bin"
            echo "  -> linked from $HOST_NODE"
          else
            echo "  WARN: no node binary available on this image"
            continue
          fi

          "$target_bin" -v >/dev/null 2>&1 && echo "  Repaired: $target_bin ($("$target_bin" -v))"
        done
      displayName: 'Repair Component Detection node runtime'
      condition: always()
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - script: |
        curl --version
        export DYLD_LIBRARY_PATH="/usr/local/Cellar/curl/$(ls -b /usr/local/Cellar/curl 2>/dev/null | grep -e '[0-9\.]' | head -1)/lib"
        bash -c 'source "$(Pipeline.Workspace)/test_config_scripts/set_e2e_test_env_vars.sh" && ./jenkins/osx_xcode_native.sh'
      displayName: 'Build and Test'
    - script: |
        rm -rf $(Agent.BuildDirectory)/*
        mkdir -p $(Agent.BuildDirectory)/s
      displayName: 'Cleanup'
      condition: always()

  - job: raspberrypi
    # ARM cross-compile replacement for the retired raspberrypi-c-buster
    # container. We cross-compile with the arm-linux-gnueabihf toolchain on
    # an x64 Microsoft-hosted agent. Tests are NOT executed; runtime ARM
    # validation is the responsibility of downstream consumers.
    timeoutInMinutes: 60
    pool:
      vmImage: 'ubuntu-24.04'
    displayName: 'Raspberry Pi (Cross-compile only)'
    steps:
    - script: git config --global core.longpaths true
      displayName: 'Enable git longpaths'
    - checkout: self
      submodules: recursive
    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          pkg-config \
          crossbuild-essential-armhf
      displayName: 'Install armhf cross toolchain'
    - script: |
        set -e
        mkdir -p cmake-armhf
        cd cmake-armhf
        cmake \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=arm \
          -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
          -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
          -Drun_unittests:BOOL=OFF \
          -Drun_e2e_tests:BOOL=OFF \
          -Duse_http:BOOL=OFF \
          -Duse_openssl:BOOL=OFF \
          -Duse_default_uuid:BOOL=ON \
          -Dskip_samples:BOOL=ON \
          ..
        cmake --build . -- --jobs=$(nproc)
      displayName: 'Cross-compile for armhf'

- stage: Cleanup
  dependsOn:
  - Setup
  - Tests
  condition: always()  # Run stage even if the pipeline run is cancelled.
  jobs:
  - job: destroy_azure_resource_group
    condition: always()  # Run job even if the pipeline run is cancelled.
    pool:
      vmImage: 'ubuntu-24.04'
    steps:
    - checkout: none
    - download: current
      artifact: test_config_scripts
      displayName: 'Download artifact (test config scripts)'
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'iot hub sdk service connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          export AZURE_RESOURCE_GROUP=$(cat "$(Pipeline.Workspace)/test_config_scripts/azure-resource-group-name.txt")
          az group delete --name $AZURE_RESOURCE_GROUP --yes --no-wait
      displayName: 'Destroy Azure Resource Group'
      condition: always()  # Run step even if the pipeline run is cancelled.
